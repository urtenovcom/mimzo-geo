name: Build mini-dat

on:
  push:
    branches: [main]
    paths:
      - 'filter/**'
      - '.github/workflows/build.yml'
  schedule:
    # Rebuild weekly to pick up upstream updates (Mondays 03:00 UTC).
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve Go modules
        run: |
          go mod tidy
          go mod download

      - name: Run filter
        run: |
          go run ./filter
          ls -la dist/

      - name: Show diff
        run: |
          git diff --stat dist/ || true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/ go.sum go.mod || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "build: refresh mini-dat from upstream"
          git push
